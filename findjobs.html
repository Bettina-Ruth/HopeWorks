<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Jobs | HopeWorks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="section">
    <h2>Available Jobs</h2>
    <p class="page-intro">Viewing jobs stays open to everyone. The application form appears only after a successful login.</p>

    <div id="jobsContainer" class="jobs-grid"></div>

    <div class="card" id="applicationPanel" hidden>
      <h3>Apply for <span id="selectedJobTitle">this role</span></h3>
      <p class="helper-note">This form is available only to logged-in users.</p>
      <form id="applicationForm" class="form-grid">
        <input id="applicationJobTitle" type="hidden">
        <input id="applicantName" type="text" placeholder="Your Name" required>
        <input id="applicantPhone" type="tel" placeholder="Phone Number" required>
        <textarea id="applicationNote" placeholder="Why are you a good fit?" required></textarea>
        <button type="submit">Submit Application</button>
        <p id="applicationMessage" class="status-message" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-links">
      <div>
        <h3>Need help?</h3>
        <p><a href="contact.html">Contact the team</a></p>
      </div>
      <div>
        <h3>Learn more</h3>
        <p><a href="about.html">About HopeWorks</a></p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
