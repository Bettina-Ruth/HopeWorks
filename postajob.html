<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job | HopeWorks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="section">
    <h2>Post a Job</h2>
    <p class="page-intro">Login is required when you actually try to submit a job.</p>

    <div class="card">
      <form id="postJobForm" class="form-grid">
        <input id="jobTitle" type="text" placeholder="Job Title" required>
        <input id="jobLocation" type="text" placeholder="Location" required>
        <input id="jobType" type="text" placeholder="Job Type" required>
        <textarea id="jobDescription" placeholder="Describe the work clearly" required></textarea>
        <button type="submit">Post Job</button>
        <p id="postJobMessage" class="status-message" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-links">
      <div>
        <h3>What happens next?</h3>
        <p>Posted jobs appear immediately in the job listings page.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
