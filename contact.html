<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | HopeWorks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="section">
    <h2>Contact HopeWorks</h2>
    <p class="page-intro">Send a quick message if you need support with registration, login, or job posting.</p>

    <div class="card">
      <form id="contactForm" class="form-grid">
        <input id="contactName" type="text" placeholder="Your Name" required>
        <input id="contactEmail" type="email" placeholder="Email Address" required>
        <textarea id="contactQuery" placeholder="Write your message" required></textarea>
        <button type="submit">Send Message</button>
        <p id="contactMessage" class="status-message" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-links">
      <div>
        <h3>Quick links</h3>
        <p><a href="register.html">Register</a></p>
        <p><a href="login.html">Login</a></p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
